<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nexus · AI Gateway</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>
<style>
  /* ================================================================ */
  /*  Design tokens — Claude Design / Linear-Vercel feel              */
  /* ================================================================ */
  :root[data-theme="dark"] {
    --bg:            #0B0D10;
    --surface:       #0F1115;
    --surface-2:     #13161B;
    --surface-hover: #16191F;
    --border:        #1A1D23;
    --border-strong: #252932;
    --text:          #E6E8EB;
    --text-dim:      #9AA0A6;
    --text-muted:    #6B7280;
    --text-faint:    #4B5563;
    --accent:        #6BB4B0;
    --accent-soft:   rgba(107,180,176,0.12);
    --accent-line:   rgba(107,180,176,0.35);
    --success:       #3FB950;
    --success-soft:  rgba(63,185,80,0.12);
    --warn:          #D29922;
    --warn-soft:     rgba(210,153,34,0.14);
    --error:         #F0524A;
    --error-soft:    rgba(240,82,74,0.12);
    --shadow-pop:    0 1px 0 rgba(255,255,255,0.02) inset, 0 12px 32px -12px rgba(0,0,0,0.6);
    --grid-line:     rgba(255,255,255,0.04);
  }
  :root[data-theme="light"] {
    --bg:            #FAFAF9;
    --surface:       #FFFFFF;
    --surface-2:     #F7F7F6;
    --surface-hover: #F2F2F1;
    --border:        #ECECEB;
    --border-strong: #DEDEDC;
    --text:          #14161A;
    --text-dim:      #4B5563;
    --text-muted:    #6B7280;
    --text-faint:    #9CA3AF;
    --accent:        #2F8B86;
    --accent-soft:   rgba(47,139,134,0.10);
    --accent-line:   rgba(47,139,134,0.35);
    --success:       #1F8B3B;
    --success-soft:  rgba(31,139,59,0.10);
    --warn:          #B5760E;
    --warn-soft:     rgba(181,118,14,0.12);
    --error:         #C83A33;
    --error-soft:    rgba(200,58,51,0.10);
    --shadow-pop:    0 1px 2px rgba(15,17,21,0.04), 0 8px 24px -12px rgba(15,17,21,0.08);
    --grid-line:     rgba(15,17,21,0.06);
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: "cv11", "ss01";
  }
  button { font-family: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; }
  input, select { font-family: inherit; color: inherit; }
  table { border-collapse: collapse; width: 100%; }
  ::selection { background: var(--accent-soft); color: var(--text); }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

  .mono { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace; font-feature-settings: "tnum"; font-variant-numeric: tabular-nums; }
  .num  { font-variant-numeric: tabular-nums; }
  .dim  { color: var(--text-dim); }
  .muted{ color: var(--text-muted); }

  /* Layout */
  .app { display: grid; grid-template-columns: 232px 1fr; min-height: 100vh; }
  @media (max-width: 900px) { .app { grid-template-columns: 1fr; } .sidebar { display: none; } }

  .sidebar {
    border-right: 1px solid var(--border);
    background: var(--surface);
    padding: 18px 14px;
    display: flex; flex-direction: column;
    position: sticky; top: 0; height: 100vh;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 8px 18px;
  }
  .brand-mark {
    width: 22px; height: 22px;
    border-radius: 6px;
    background: linear-gradient(135deg, var(--accent) 0%, color-mix(in oklab, var(--accent) 60%, #000) 100%);
    display: grid; place-items: center;
    color: #fff; font-weight: 700; font-size: 11px; letter-spacing: 0.02em;
  }
  .brand-name { font-weight: 600; font-size: 14px; letter-spacing: -0.005em; }
  .brand-env { margin-left: auto; font-size: 10px; color: var(--text-muted); padding: 2px 6px; border: 1px solid var(--border-strong); border-radius: 4px; text-transform: uppercase; letter-spacing: 0.05em; }

  .nav { display: flex; flex-direction: column; gap: 1px; margin-top: 6px; }
  .nav-section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); padding: 14px 8px 6px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 8px;
    border-radius: 6px;
    color: var(--text-dim);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 80ms ease, color 80ms ease;
    width: 100%; text-align: left;
  }
  .nav-item:hover { background: var(--surface-hover); color: var(--text); }
  .nav-item.active { background: var(--surface-hover); color: var(--text); }
  .nav-item.active .nav-icon { color: var(--accent); }
  .nav-icon { width: 16px; height: 16px; color: var(--text-muted); flex-shrink: 0; }
  .nav-item .count { margin-left: auto; font-size: 11px; color: var(--text-muted); font-variant-numeric: tabular-nums; }

  .sidebar-foot { margin-top: auto; padding: 12px 8px 4px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .avatar { width: 24px; height: 24px; border-radius: 50%; background: var(--accent-soft); color: var(--accent); display: grid; place-items: center; font-size: 11px; font-weight: 600; }
  .who { display: flex; flex-direction: column; }
  .who-name { font-size: 13px; font-weight: 500; }
  .who-org { font-size: 11px; color: var(--text-muted); }

  /* Main */
  .main { min-width: 0; display: flex; flex-direction: column; }
  .topbar {
    display: flex; align-items: center; gap: 16px;
    height: 52px;
    padding: 0 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky; top: 0; z-index: 5;
  }
  .crumbs { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-dim); }
  .crumb-sep { color: var(--text-faint); }
  .crumb-current { color: var(--text); font-weight: 500; }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .live-dot {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--text-dim);
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 999px;
  }
  .live-dot::before {
    content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--success);
    box-shadow: 0 0 0 3px var(--success-soft);
    transition: background 180ms;
  }
  .live-dot.offline::before { background: var(--error); box-shadow: 0 0 0 3px var(--error-soft); }
  .icon-btn {
    width: 30px; height: 30px;
    display: grid; place-items: center;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    transition: background 80ms, color 80ms, border-color 80ms;
  }
  .icon-btn:hover { background: var(--surface-hover); color: var(--text); border-color: var(--border-strong); }
  .icon-btn svg { width: 14px; height: 14px; }
  .icon-btn.spinning svg { animation: spin 800ms linear; }
  @keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }

  /* Page */
  .page { padding: 28px 32px 80px; max-width: 1480px; }
  @media (max-width: 700px) { .page { padding: 20px 16px 60px; } }
  .page-head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 24px; gap: 24px; flex-wrap: wrap; }
  .page-title { font-size: 20px; font-weight: 600; letter-spacing: -0.01em; margin: 0 0 4px; }
  .page-sub { font-size: 13px; color: var(--text-muted); margin: 0; }

  /* Range pill / segmented */
  .seg { display: inline-flex; padding: 2px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 7px; }
  .seg button {
    padding: 4px 10px;
    font-size: 12px; font-weight: 500;
    color: var(--text-dim);
    border-radius: 5px;
    transition: background 80ms, color 80ms;
  }
  .seg button:hover { color: var(--text); }
  .seg button.on { background: var(--surface); color: var(--text); box-shadow: 0 1px 0 rgba(255,255,255,0.02); }
  :root[data-theme="light"] .seg button.on { box-shadow: 0 1px 2px rgba(15,17,21,0.06); }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    height: 30px;
    padding: 0 12px;
    font-size: 12px; font-weight: 500;
    border-radius: 6px;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--text);
    transition: background 80ms, border-color 80ms, color 80ms;
    white-space: nowrap;
  }
  .btn:hover { background: var(--surface-hover); }
  .btn.primary { background: var(--accent); color: #0B0D10; border-color: var(--accent); }
  .btn.primary:hover { filter: brightness(1.06); }
  .btn.danger { color: var(--error); border-color: color-mix(in oklab, var(--error) 30%, transparent); }
  .btn.danger:hover { background: var(--error-soft); }
  .btn svg { width: 12px; height: 12px; }
  .btn.xs { height: 24px; padding: 0 8px; font-size: 11px; }

  /* KPI cards */
  .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  @media (max-width: 1180px) { .kpis { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 600px)  { .kpis { grid-template-columns: 1fr; } }

  .kpi {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px 14px;
    display: flex; flex-direction: column; gap: 6px;
    position: relative;
    overflow: hidden;
    min-height: 96px;
  }
  .kpi-head { display: flex; align-items: center; gap: 8px; }
  .kpi-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); font-weight: 500; }
  .kpi-value { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 28px; font-weight: 500; letter-spacing: -0.015em; line-height: 1.1; font-variant-numeric: tabular-nums; color: var(--text); margin-top: 4px; }
  .kpi-value .unit { font-size: 14px; color: var(--text-muted); margin-left: 4px; font-weight: 400; }
  .kpi-sub { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .kpi-sub .delta { display: inline-flex; align-items: center; gap: 3px; font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; }
  .delta.up { color: var(--success); }
  .delta.down { color: var(--error); }
  .kpi-spark { position: absolute; right: 12px; top: 12px; width: 84px; height: 28px; opacity: 0.9; }

  /* Cards / panels */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .panel-head {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    min-height: 48px;
    flex-wrap: wrap;
  }
  .panel-title { font-size: 13px; font-weight: 600; color: var(--text); margin: 0; }
  .panel-sub   { font-size: 12px; color: var(--text-muted); }
  .panel-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .panel-body { padding: 16px; }
  .panel-body.flush { padding: 0; }

  .legend { display: inline-flex; gap: 14px; align-items: center; }
  .legend-item { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-dim); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

  .grid-2 { display: grid; grid-template-columns: 1.3fr 1fr; gap: 12px; margin-bottom: 12px; }
  @media (max-width: 1180px) { .grid-2 { grid-template-columns: 1fr; } }
  .grid-cards-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 1024px) { .grid-cards-2 { grid-template-columns: 1fr; } }

  /* Charts
     Chart.js v4 with `responsive: true` measures the canvas's PARENT element
     and writes back inline `style.width`/`style.height` (CSS pixels) on the
     canvas every resize tick. So the parent must have a definite, non-zero
     box size at construction time, and the canvas must be a normal block-flow
     child whose intrinsic 300×150 fallback never gets used.

     The trap the previous fix fell into: removing the `width:100% !important`
     rule was correct for tooltip hit-testing, BUT nothing replaced it, so the
     canvas reverted to `display: inline` with a 300×150 intrinsic size. On
     tab swap, the rAF construction would sometimes win the race and Chart.js
     would size it correctly (the 300×150 attribute size still gets overridden
     by inline style.width in pixels) — but if the .grid-2 column had not yet
     resolved its fr-track width when the rAF fired, Chart.js measured the
     parent at 0×N or N×0 and produced an invisible chart. Even worse, the
     inline canvas baseline alignment introduced sub-pixel whitespace that
     could collapse the box.

     The fix:
       1. .chart-box owns the layout (fixed height, position:relative).
       2. Inner .chart-canvas-wrap is the SIZING parent Chart.js measures,
          absolutely positioned to inset:0 so it always has the chart-box's
          inner dimensions immediately on insertion (no fr-track race).
       3. canvas is display:block so no inline whitespace.
       4. We keep Chart.js fully in control of the canvas's own width/height
          (no !important), preserving DPR-aware tooltip hit testing. */
  .chart-box {
    /* Padding is intentionally NOT on this element: padding has no effect on
       the absolutely-positioned .chart-canvas-wrap inside, so we apply the
       breathing room via the wrap's `inset` instead — this also guarantees
       the wrap reports a deterministic size to Chart.js's ResizeObserver. */
    padding: 0;
    height: 268px;
    min-height: 268px;
    position: relative;
  }
  .chart-box.tall { height: 340px; min-height: 340px; }
  .chart-canvas-wrap {
    position: absolute;
    inset: 12px 16px 16px;
  }
  .chart-canvas-wrap > canvas { display: block; }

  /* Provider health grid */
  .health {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1px;
    background: var(--border);
    border-radius: 0 0 10px 10px;
    overflow: hidden;
  }
  .health-cell {
    background: var(--surface);
    padding: 14px 16px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .health-row { display: flex; align-items: center; gap: 10px; }
  .health-name { font-size: 13px; font-weight: 500; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .health-key { color: var(--text-muted); font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  .health-stats { display: flex; gap: 16px; }
  .health-stat { display: flex; flex-direction: column; gap: 2px; }
  .health-stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); }
  .health-stat-value { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text); font-variant-numeric: tabular-nums; }

  /* Status badges */
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 2px 8px;
    font-size: 11px; font-weight: 500;
    border-radius: 4px;
    border: 1px solid transparent;
    white-space: nowrap;
    line-height: 1.5;
  }
  .badge::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .badge.ok            { color: var(--success); background: var(--success-soft); border-color: color-mix(in oklab, var(--success) 25%, transparent); }
  .badge.warn          { color: var(--warn);    background: var(--warn-soft);    border-color: color-mix(in oklab, var(--warn) 30%, transparent); }
  .badge.err           { color: var(--error);   background: var(--error-soft);   border-color: color-mix(in oklab, var(--error) 30%, transparent); }
  .badge.neutral       { color: var(--text-dim); background: var(--surface-2); border-color: var(--border-strong); }
  .badge.disabled      { color: var(--text-muted); background: var(--surface-2); border-color: var(--border); }

  /* Tables */
  .table { width: 100%; border-collapse: separate; border-spacing: 0; }
  .table-wrap { overflow-x: auto; }
  .table thead th {
    position: sticky; top: 0;
    background: var(--surface);
    text-align: left;
    font-size: 11px; font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    user-select: none;
    z-index: 1;
  }
  .table tbody td {
    padding: 9px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: var(--text);
    vertical-align: middle;
  }
  .table tbody tr { transition: background 60ms ease; }
  .table tbody tr:hover { background: var(--surface-hover); }
  .table tbody tr.expanded { background: var(--surface-hover); }
  .table tbody tr:last-child td { border-bottom: 0; }
  .table .num-cell { font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; }
  .table .right { text-align: right; }
  .table tbody tr.clickable { cursor: pointer; }
  .table.compact tbody td { padding: 6px 12px; height: 32px; }

  /* mini-bars */
  .mini-bar { width: 80px; height: 4px; background: var(--surface-2); border-radius: 2px; overflow: hidden; display: inline-block; vertical-align: middle; }
  .mini-bar > span { display: block; height: 100%; background: var(--accent); border-radius: 2px; }

  /* expanded preview row */
  .expand-row td { padding: 0; border-bottom: 1px solid var(--border); background: var(--surface-2); }
  .expand-inner { padding: 14px 16px 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 900px) { .expand-inner { grid-template-columns: 1fr; } }
  .expand-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 6px; }
  .preview-mono {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.55;
    color: var(--text-dim);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 220px;
    overflow: auto;
  }

  /* Toolbar / search */
  .toolbar { display: flex; align-items: center; gap: 8px; padding: 12px 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .search { position: relative; flex: 0 1 320px; min-width: 200px; }
  .search input {
    width: 100%;
    height: 30px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0 10px 0 30px;
    font-size: 13px;
    color: var(--text);
    transition: border-color 80ms;
  }
  .search input:focus { outline: none; border-color: var(--accent); }
  .search input::placeholder { color: var(--text-muted); }
  .search svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--text-muted); }
  .filter-pill {
    display: inline-flex; align-items: center; gap: 6px;
    height: 30px;
    padding: 0 10px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12px;
    color: var(--text-dim);
    cursor: pointer;
    transition: border-color 80ms, color 80ms, background 80ms;
  }
  .filter-pill:hover { color: var(--text); border-color: var(--border-strong); }
  .filter-pill.active { color: var(--text); border-color: var(--accent-line); background: var(--accent-soft); }
  .filter-pill svg { width: 12px; height: 12px; }
  .toolbar-spacer { flex: 1; }
  .toolbar-meta { font-size: 12px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }

  /* Forms */
  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .form-group label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); font-weight: 500; }
  .form-group input[type="text"], .form-group input[type="password"], .form-group select {
    height: 32px;
    padding: 0 10px;
    background: var(--surface-2);
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
  }
  .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent); }
  .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); backdrop-filter: blur(2px); z-index: 70; display: grid; place-items: center; padding: 20px; }
  .modal { width: 460px; max-width: 100%; background: var(--surface); border: 1px solid var(--border-strong); border-radius: 10px; box-shadow: var(--shadow-pop); }
  .modal-header { display: flex; align-items: center; padding: 14px 18px; border-bottom: 1px solid var(--border); }
  .modal-header h3 { margin: 0; font-size: 14px; font-weight: 600; }
  .modal-close { margin-left: auto; color: var(--text-muted); padding: 4px; line-height: 1; }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 16px 18px 18px; }

  /* Drawer */
  .drawer-scrim {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(2px);
    opacity: 0; pointer-events: none;
    transition: opacity 160ms ease;
    z-index: 50;
  }
  .drawer-scrim.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 520px; max-width: 92vw;
    background: var(--surface);
    border-left: 1px solid var(--border);
    transform: translateX(100%);
    transition: transform 200ms cubic-bezier(.2,.7,.2,1);
    z-index: 60;
    display: flex; flex-direction: column;
  }
  .drawer.open { transform: translateX(0); }
  .drawer-head { display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-bottom: 1px solid var(--border); }
  .drawer-title { font-size: 14px; font-weight: 600; }
  .drawer-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .drawer-body { padding: 16px 18px; overflow: auto; flex: 1; }

  .drawer-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 18px; }
  .drawer-stat { background: var(--surface-2); padding: 12px 14px; }
  .drawer-stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); }
  .drawer-stat-value { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-variant-numeric: tabular-nums; color: var(--text); margin-top: 4px; }

  /* Empty state */
  .empty {
    padding: 64px 24px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    color: var(--text-muted);
    text-align: center;
  }
  .empty svg { width: 28px; height: 28px; color: var(--text-faint); margin-bottom: 4px; }
  .empty-title { color: var(--text-dim); font-size: 13px; font-weight: 500; }
  .empty-sub { font-size: 12px; }

  /* Skeleton */
  .skeleton { background: linear-gradient(90deg, var(--surface-2) 0%, var(--surface-hover) 50%, var(--surface-2) 100%); background-size: 200% 100%; animation: shimmer 1.6s ease-in-out infinite; border-radius: 4px; display: inline-block; }
  @keyframes shimmer { 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }

  /* Tabs */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Toast */
  .toast-container { position: fixed; right: 20px; bottom: 20px; z-index: 90; display: flex; flex-direction: column; gap: 8px; }
  .toast { padding: 10px 14px; border-radius: 8px; background: var(--surface); border: 1px solid var(--border-strong); color: var(--text); font-size: 13px; box-shadow: var(--shadow-pop); transition: opacity 200ms, transform 200ms; min-width: 200px; }
  .toast.error { border-color: color-mix(in oklab, var(--error) 40%, transparent); color: var(--error); }
  .toast.success { border-color: color-mix(in oklab, var(--success) 30%, transparent); }

  .ellipsis { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 240px; }
  .provider-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; display: inline-block; }
  .spark path.line { fill: none; stroke: var(--accent); stroke-width: 1.5; }
  .spark path.area { fill: var(--accent-soft); stroke: none; }

  /* Toggle switch */
  .switch {
    --w: 28px; --h: 16px;
    position: relative;
    display: inline-block;
    width: var(--w); height: var(--h);
    background: var(--surface-2);
    border: 1px solid var(--border-strong);
    border-radius: 999px;
    transition: background 120ms ease, border-color 120ms ease;
    cursor: pointer;
    flex-shrink: 0;
  }
  .switch::after {
    content: "";
    position: absolute; top: 1px; left: 1px;
    width: 12px; height: 12px;
    background: var(--text-dim);
    border-radius: 50%;
    transition: transform 140ms ease, background 120ms ease;
  }
  .switch.on { background: var(--accent-soft); border-color: var(--accent-line); }
  .switch.on::after { transform: translateX(12px); background: var(--accent); }

  .row-actions { display: inline-flex; gap: 4px; }

</style>
</head>

<script>
/* ====================================================================
 *  Nexus dashboard — single-file frontend
 *  Consumes the existing /dashboard/* endpoints in index.ts:
 *    GET  /dashboard/summary
 *    GET  /dashboard/usage?period=daily|weekly&days=N
 *    GET  /dashboard/usage-by-model?days=N
 *    GET  /dashboard/calls?limit=N&offset=N
 *    GET  /dashboard/models
 *    POST /dashboard/models     PUT/DELETE /dashboard/models/:id
 *    GET  /dashboard/api-keys
 *    POST /dashboard/api-keys   PUT/DELETE /dashboard/api-keys/:id
 *
 *  Provider health and per-key stats are derived client-side from the
 *  /dashboard/calls window — there's no /dashboard/health endpoint yet.
 *  TODO server: GET /dashboard/health (per-key circuit-breaker state)
 *  TODO server: GET /dashboard/breakdown?dim=referer|ua|origin
 * ==================================================================== */
(function () {
  'use strict';

  /* ---------- Auth header ---------- */
  const AUTH_KEY = (typeof localStorage !== 'undefined' && localStorage.getItem('nexus_master_key')) || '';

  /* ---------- API helper ---------- */
  function api(path, opts = {}) {
    const headers = { 'Content-Type': 'application/json' };
    if (AUTH_KEY) headers['Authorization'] = `Bearer ${AUTH_KEY}`;
    return fetch(path, { headers, ...opts }).then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    });
  }

  /* ---------- Provider metadata (visual only) ---------- */
  const PROVIDERS = {
    cerebras:   { label: 'Cerebras',         color: '#6BB4B0' },
    groq:       { label: 'Groq',             color: '#9CA3AF' },
    cf:         { label: 'Cloudflare WAI',   color: '#C49A6C' },
    cloudflare: { label: 'Cloudflare WAI',   color: '#C49A6C' },
    openrouter: { label: 'OpenRouter',       color: '#7B8794' },
    gemini:     { label: 'Google Gemini',    color: '#8AA4D6' },
    deepseek:   { label: 'DeepSeek',         color: '#7AA0C9' },
    openai:     { label: 'OpenAI',           color: '#9AB6A6' },
    anthropic:  { label: 'Anthropic',        color: '#C19A87' },
  };
  function provLabel(id) { return (PROVIDERS[id] && PROVIDERS[id].label) || id || '—'; }
  function provColor(id) { return (PROVIDERS[id] && PROVIDERS[id].color) || '#7B8794'; }

  /* ---------- Formatters ---------- */
  function fmtCompact(n) {
    if (n === null || n === undefined || isNaN(n)) return '—';
    const abs = Math.abs(n);
    if (abs >= 1e9) return (n / 1e9).toFixed(2) + 'B';
    if (abs >= 1e6) return (n / 1e6).toFixed(2) + 'M';
    if (abs >= 1e3) return (n / 1e3).toFixed(1) + 'k';
    return String(n);
  }
  function fmtInt(n) {
    if (n === null || n === undefined || isNaN(n)) return '—';
    return Number(n).toLocaleString('en-US');
  }
  function fmtMs(n) {
    if (n === null || n === undefined || isNaN(n)) return '—';
    if (n >= 1000) return (n / 1000).toFixed(2) + 's';
    return Math.round(n) + 'ms';
  }
  function fmtRel(date) {
    const d = (date instanceof Date) ? date : new Date(date);
    const diff = (Date.now() - d.getTime()) / 1000;
    if (diff < 60) return Math.max(1, Math.round(diff)) + 's ago';
    if (diff < 3600) return Math.round(diff / 60) + 'm ago';
    if (diff < 86400) return Math.round(diff / 3600) + 'h ago';
    return Math.round(diff / 86400) + 'd ago';
  }
  function escHtml(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
  }
  function escAttr(s) { return escHtml(s); }

  /* ---------- Sparkline (inline SVG) ---------- */
  function sparkSvg(values) {
    if (!values || !values.length) return '';
    const w = 84, h = 28, pad = 2;
    const min = Math.min(...values), max = Math.max(...values);
    const span = max - min || 1;
    const dx = (w - pad * 2) / (values.length - 1 || 1);
    const pts = values.map((v, i) => [pad + i * dx, h - pad - ((v - min) / span) * (h - pad * 2)]);
    const line = pts.map((p, i) => (i ? 'L' : 'M') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
    const area = line + ` L ${pts[pts.length - 1][0].toFixed(1)},${h - pad} L ${pad},${h - pad} Z`;
    return `<svg class="spark" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" preserveAspectRatio="none"><path class="area" d="${area}"/><path class="line" d="${line}"/></svg>`;
  }

  /* ---------- Status badge ---------- */
  // tone in {ok, warn, err, neutral, disabled}
  function badge(tone, label) {
    return `<span class="badge ${tone}">${escHtml(label)}</span>`;
  }
  function statusFromHttp(success, code) {
    if (success === 1 || success === true) return badge('ok', '2xx');
    if (code && /^4/.test(String(code))) return badge('warn', String(code));
    if (code && /^5/.test(String(code))) return badge('err', String(code));
    return badge('err', 'Error');
  }

  /* ---------- Empty state ---------- */
  function emptyState(title, sub) {
    return `<div class="empty"><svg><use href="#i-empty"/></svg><div class="empty-title">${escHtml(title)}</div><div class="empty-sub">${escHtml(sub || '')}</div></div>`;
  }

  /* ---------- Toast ---------- */
  function toast(msg, type) {
    const c = document.getElementById('toast-container');
    if (!c) return;
    const el = document.createElement('div');
    el.className = 'toast ' + (type || 'success');
    el.textContent = msg;
    c.appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateX(20px)'; setTimeout(() => el.remove(), 240); }, 3200);
  }

  /* ====================================================================
   *  Chart.js shared defaults — disciplined neutral palette
   * ==================================================================== */
  function readCss(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
  function tokenColors() {
    return {
      grid:    readCss('--grid-line') || 'rgba(255,255,255,0.04)',
      tickDim: readCss('--text-muted'),
      tickBody:readCss('--text-dim'),
      accent:  readCss('--accent') || '#6BB4B0',
      accentSoft: readCss('--accent-soft'),
      surface: readCss('--surface'),
      surface2:readCss('--surface-2'),
      border:  readCss('--border-strong'),
      text:    readCss('--text'),
      success: readCss('--success'),
      warn:    readCss('--warn'),
      error:   readCss('--error'),
    };
  }
  function applyChartDefaults() {
    if (!window.Chart) return;
    const c = tokenColors();
    const C = window.Chart;
    C.defaults.font.family = "'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif";
    C.defaults.font.size = 12;
    C.defaults.color = c.tickBody;
    C.defaults.borderColor = c.grid;
    C.defaults.plugins.legend.display = false;
    // Tooltip: re-enabled and restyled. Defaults can be silently neutralized
    // by stale Chart.defaults state, so set every relevant key explicitly.
    C.defaults.plugins.tooltip.enabled = true;
    C.defaults.plugins.tooltip.backgroundColor = c.surface2 || c.surface;
    C.defaults.plugins.tooltip.borderColor = c.border;
    C.defaults.plugins.tooltip.borderWidth = 1;
    C.defaults.plugins.tooltip.titleColor = c.text;
    C.defaults.plugins.tooltip.bodyColor = c.text;
    C.defaults.plugins.tooltip.padding = { top: 8, right: 10, bottom: 8, left: 10 };
    C.defaults.plugins.tooltip.cornerRadius = 6;
    C.defaults.plugins.tooltip.displayColors = true;
    C.defaults.plugins.tooltip.boxPadding = 6;
    C.defaults.plugins.tooltip.titleFont = { family: "'JetBrains Mono', monospace", size: 11, weight: '500' };
    C.defaults.plugins.tooltip.bodyFont = { family: "'JetBrains Mono', monospace", size: 12 };
    C.defaults.plugins.tooltip.caretSize = 0;
    // Make hover responsive across the column (bars are thin) so tooltips
    // actually surface on hover instead of requiring a pixel-perfect hit.
    C.defaults.interaction = { mode: 'index', intersect: false };
    C.defaults.plugins.tooltip.mode = 'index';
    C.defaults.plugins.tooltip.intersect = false;
    C.defaults.events = ['mousemove', 'mouseout', 'click', 'touchstart', 'touchmove'];
    C.defaults.elements.bar.borderRadius = 3;
    C.defaults.elements.bar.borderSkipped = false;
    C.defaults.elements.line.borderWidth = 1.5;
    C.defaults.elements.line.tension = 0.32;
    C.defaults.elements.point.radius = 0;
    C.defaults.elements.point.hoverRadius = 3;
    C.defaults.maintainAspectRatio = false;
    C.defaults.responsive = true;
    C.defaults.animation = { duration: 240, easing: 'easeOutQuart' };
  }
  function gridScale(c) {
    return { grid: { color: c.grid, drawTicks: false, lineWidth: 1 }, border: { display: false }, ticks: { color: c.tickDim, font: { size: 11 }, padding: 8 } };
  }
  function noGridScale(c) {
    return { grid: { display: false, drawTicks: false }, border: { display: false }, ticks: { color: c.tickDim, font: { size: 11 }, padding: 6 } };
  }

  /* Safety net for the tab-swap race: even though the canvas's parent now has
     a definite size before construction (see .chart-canvas-wrap), some
     browsers don't deliver the ResizeObserver tick that Chart.js relies on
     for its first paint when the element is inserted via innerHTML in the
     same task as construction. We attach our own observer that issues a
     `chart.resize()` (which forces a synchronous re-measure + redraw) the
     first time the wrapper reports a non-zero size, then disconnects.
     This is what was actually missing — the prior fix's single rAF couldn't
     guarantee the ResizeObserver fired before the user's eyes did. */
  function attachFirstSizeKick(chart, wrapEl) {
    if (!chart || !wrapEl || typeof ResizeObserver === 'undefined') return;
    let kicked = false;
    const ro = new ResizeObserver((entries) => {
      for (const e of entries) {
        const cr = e.contentRect;
        if (!kicked && cr.width > 0 && cr.height > 0) {
          kicked = true;
          try { chart.resize(); chart.update('none'); } catch (_) {}
          // keep observing for sidebar collapses / window resizes — Chart.js
          // does its own observation, but ours is a free belt-and-suspenders
        }
      }
    });
    ro.observe(wrapEl);
    // Stash for cleanup on destroy
    chart.$ro = ro;
  }

  // Analogous palette for per-model bars (teal → cyan → blue → soft violet)
  const MODEL_PALETTE = [
    'hsl(178 42% 60%)', 'hsl(190 44% 62%)', 'hsl(202 46% 64%)',
    'hsl(214 48% 66%)', 'hsl(226 46% 68%)', 'hsl(238 42% 70%)',
    'hsl(250 38% 70%)', 'hsl(196 36% 56%)', 'hsl(220 34% 58%)', 'hsl(244 30% 62%)',
  ];

  /* ====================================================================
   *  Application state
   * ==================================================================== */
  const state = {
    tab: 'overview',
    theme: 'dark',
    charts: {},
    summary: null,
    usageDaily: null,    // [{date, tokens_input, tokens_output, requests, errors}]
    modelRollup: null,   // [{model, tokens_input, tokens_output, requests, errors}]
    calls: [],
    callsOffset: 0,
    callsFilter: 'all',  // all | success | error
    models: null,        // [{id, model_name, provider, active, created_at}]
    apiKeys: null,       // [{id, provider, key_value (masked), account_id, label, active, created_at}]
    rangeDays: 30,
    online: true,
  };

  /* ====================================================================
   *  Tab swap
   * ==================================================================== */
  const TAB_LABEL = { overview: 'Overview', usage: 'Usage', models: 'Models', keys: 'API Keys', log: 'Call Log' };
  function switchTab(name) {
    state.tab = name;
    document.querySelectorAll('#nav .nav-item').forEach(el => el.classList.toggle('active', el.dataset.tab === name));
    const cc = document.getElementById('crumb-current'); if (cc) cc.textContent = TAB_LABEL[name] || name;
    renderTab();
  }
  function destroyCharts() {
    for (const k in state.charts) {
      const ch = state.charts[k];
      try { if (ch && ch.$ro) ch.$ro.disconnect(); } catch (e) {}
      try { ch && ch.destroy(); } catch (e) {}
    }
    state.charts = {};
  }
  function renderTab() {
    destroyCharts();
    const host = document.getElementById('tab-host');
    if (!host) return;
    let html = '';
    switch (state.tab) {
      case 'overview': html = renderOverview(); break;
      case 'usage':    html = renderUsage(); break;
      case 'models':   html = renderModels(); break;
      case 'keys':     html = renderKeys(); break;
      case 'log':      html = renderLog(); break;
    }
    host.innerHTML = html;
    if (state.tab === 'overview') mountOverview();
    if (state.tab === 'usage')    mountUsage();
    if (state.tab === 'models')   mountModels();
    if (state.tab === 'keys')     mountKeys();
    if (state.tab === 'log')      mountLog();
  }

  /* ====================================================================
   *  OVERVIEW
   * ==================================================================== */
  function deltaPill(d) {
    if (d === null || d === undefined || isNaN(d)) return '';
    const up = d >= 0;
    return `<span class="delta ${up ? 'up' : 'down'} mono">${up ? '↑' : '↓'} ${Math.abs(d).toFixed(1)}%</span>`;
  }
  function deriveOverview() {
    const s = state.summary || {};
    const d = state.usageDaily || [];
    const last7  = d.slice(-7);
    const prev7  = d.slice(-14, -7);
    const sumIn  = (arr) => arr.reduce((a, x) => a + (Number(x.tokens_input) || 0), 0);
    const sumOut = (arr) => arr.reduce((a, x) => a + (Number(x.tokens_output) || 0), 0);
    const sumReq = (arr) => arr.reduce((a, x) => a + (Number(x.requests) || 0), 0);
    const sumErr = (arr) => arr.reduce((a, x) => a + (Number(x.errors) || 0), 0);

    const tokensToday = (Number(s.tokens_input_today) || 0) + (Number(s.tokens_output_today) || 0);
    const tokensWeek  = sumIn(last7) + sumOut(last7);
    const tokensPrev  = sumIn(prev7) + sumOut(prev7);
    const reqToday    = Number(s.requests_today) || 0;
    const reqWeek     = sumReq(last7);
    const reqPrev     = sumReq(prev7);
    const errToday    = Number(s.errors_today) || 0;
    const errRate     = reqToday ? (errToday / reqToday) * 100 : 0;

    // latency + p95 from recent calls window
    const lat = (state.calls || []).filter(c => c.duration_ms != null).map(c => Number(c.duration_ms));
    const avg = lat.length ? lat.reduce((a, b) => a + b, 0) / lat.length : null;
    const sorted = [...lat].sort((a, b) => a - b);
    const p95 = sorted.length ? sorted[Math.floor(sorted.length * 0.95)] : null;

    function pct(curr, prev) { if (!prev) return null; return ((curr - prev) / prev) * 100; }

    return {
      tokens: {
        value: tokensToday,
        in: Number(s.tokens_input_today) || 0,
        out: Number(s.tokens_output_today) || 0,
        spark: last7.map(x => (Number(x.tokens_input) || 0) + (Number(x.tokens_output) || 0)),
        delta: pct(tokensWeek, tokensPrev),
      },
      requests: {
        value: reqToday,
        weekTotal: reqWeek,
        spark: last7.map(x => Number(x.requests) || 0),
        delta: pct(reqWeek, reqPrev),
      },
      errors: {
        value: errToday,
        errRate,
        spark: last7.map(x => Number(x.errors) || 0),
      },
      latency: {
        avg, p95,
        spark: lat.slice(0, 12).reverse(),
      },
    };
  }

  function renderOverview() {
    const k = deriveOverview();
    const sparkHtml = (vals) => `<div class="kpi-spark">${sparkSvg(vals)}</div>`;
    const noTokens = !k.tokens.value && !k.tokens.in && !k.tokens.out;
    const noUsage = !state.usageDaily || state.usageDaily.length === 0;
    const noModels = !state.modelRollup || state.modelRollup.length === 0;

    return `
      <div class="page">
        <div class="page-head">
          <div>
            <h1 class="page-title">Overview</h1>
            <p class="page-sub">Last 30 days · all providers</p>
          </div>
          <div class="seg" data-range>
            <button data-value="7"  class="${state.rangeDays===7?'on':''}">7d</button>
            <button data-value="14" class="${state.rangeDays===14?'on':''}">14d</button>
            <button data-value="30" class="${state.rangeDays===30?'on':''}">30d</button>
            <button data-value="90" class="${state.rangeDays===90?'on':''}">90d</button>
          </div>
        </div>

        <div class="kpis">
          <div class="kpi">
            <div class="kpi-head"><div class="kpi-label">Tokens today</div></div>
            <div class="kpi-value">${fmtCompact(k.tokens.value)}</div>
            <div class="kpi-sub">
              <span class="mono">${fmtCompact(k.tokens.in)} in · ${fmtCompact(k.tokens.out)} out</span>
              ${deltaPill(k.tokens.delta)}
            </div>
            ${sparkHtml(k.tokens.spark)}
          </div>

          <div class="kpi">
            <div class="kpi-head"><div class="kpi-label">Requests today</div></div>
            <div class="kpi-value">${fmtInt(k.requests.value)}</div>
            <div class="kpi-sub">
              <span class="mono">${fmtInt(k.requests.weekTotal)} this week</span>
              ${deltaPill(k.requests.delta)}
            </div>
            ${sparkHtml(k.requests.spark)}
          </div>

          <div class="kpi">
            <div class="kpi-head"><div class="kpi-label">Errors today</div></div>
            <div class="kpi-value" style="${k.errors.value > 0 ? 'color:var(--error)' : ''}">${fmtInt(k.errors.value)}</div>
            <div class="kpi-sub">
              <span class="mono">${k.errors.errRate ? k.errors.errRate.toFixed(2) + '% err rate' : 'no errors'}</span>
            </div>
            ${sparkHtml(k.errors.spark)}
          </div>

          <div class="kpi">
            <div class="kpi-head"><div class="kpi-label">Avg latency · recent</div></div>
            <div class="kpi-value">${fmtMs(k.latency.avg)}</div>
            <div class="kpi-sub">
              <span class="mono">p95 ${fmtMs(k.latency.p95)}</span>
            </div>
            ${sparkHtml(k.latency.spark)}
          </div>
        </div>

        <div class="grid-2">
          <div class="panel">
            <div class="panel-head">
              <div>
                <div class="panel-title">Tokens by day</div>
                <div class="panel-sub">last ${state.rangeDays} days · stacked input + output</div>
              </div>
              <div class="panel-actions">
                <span class="legend">
                  <span class="legend-item"><span class="legend-dot" style="background:var(--accent)"></span>Input</span>
                  <span class="legend-item"><span class="legend-dot" style="background:rgba(107,180,176,0.32)"></span>Output</span>
                </span>
              </div>
            </div>
            ${noUsage ? emptyState('No usage yet', 'Token volume will appear here as requests come in.') : `<div class="chart-box"><div class="chart-canvas-wrap"><canvas id="ch-tokens-by-day"></canvas></div></div>`}
          </div>

          <div class="panel">
            <div class="panel-head">
              <div>
                <div class="panel-title">Tokens by model</div>
                <div class="panel-sub">top 10 · last ${state.rangeDays} days</div>
              </div>
            </div>
            ${noModels ? emptyState('No model traffic', 'Per-model breakdown will appear once data exists.') : `<div class="chart-box"><div class="chart-canvas-wrap"><canvas id="ch-tokens-by-model"></canvas></div></div>`}
          </div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <div>
              <div class="panel-title">Provider activity</div>
              <div class="panel-sub">last 24h · derived from recent call log · per provider</div>
            </div>
          </div>
          ${renderProviderActivity()}
        </div>
      </div>
    `;
  }

  function renderProviderActivity() {
    // Aggregate by provider from recent calls (no dedicated /health endpoint yet)
    const byProv = new Map();
    for (const c of (state.calls || [])) {
      const id = c.provider || 'unknown';
      const e = byProv.get(id) || { provider: id, reqs: 0, ok: 0, totalTokens: 0, latencies: [] };
      e.reqs++;
      if (c.success) e.ok++;
      e.totalTokens += (Number(c.tokens_input) || 0) + (Number(c.tokens_output) || 0);
      if (c.duration_ms != null) e.latencies.push(Number(c.duration_ms));
      byProv.set(id, e);
    }
    const cells = [...byProv.values()];
    if (!cells.length) {
      return `<div class="panel-body">${emptyState('No recent calls', 'Provider snapshot needs at least one logged request.')}</div>`;
    }
    cells.sort((a, b) => b.reqs - a.reqs);
    return `<div class="health">${cells.map(e => {
      const success = e.reqs ? (e.ok / e.reqs) * 100 : 0;
      const sortedLat = e.latencies.slice().sort((a, b) => a - b);
      const p50 = sortedLat.length ? sortedLat[Math.floor(sortedLat.length / 2)] : null;
      let tone = 'ok', label = 'Healthy';
      if (success < 90) { tone = 'err'; label = 'Degraded'; }
      else if (success < 99) { tone = 'warn'; label = 'Watch'; }
      return `
        <div class="health-cell">
          <div class="health-row">
            <div class="health-name">
              <span class="provider-dot" style="background:${provColor(e.provider)}"></span>
              ${escHtml(provLabel(e.provider))}
            </div>
            <div style="margin-left:auto">${badge(tone, label)}</div>
          </div>
          <div class="health-stats">
            <div class="health-stat"><div class="health-stat-label">p50</div><div class="health-stat-value">${p50 != null ? fmtMs(p50) : '—'}</div></div>
            <div class="health-stat"><div class="health-stat-label">success</div><div class="health-stat-value">${success.toFixed(2)}%</div></div>
            <div class="health-stat"><div class="health-stat-label">reqs</div><div class="health-stat-value">${fmtInt(e.reqs)}</div></div>
          </div>
        </div>
      `;
    }).join('')}</div>`;
  }

  function mountOverview() {
    document.querySelectorAll('[data-range] button').forEach(b => {
      b.addEventListener('click', () => {
        state.rangeDays = parseInt(b.dataset.value, 10) || 30;
        loadUsageDaily().then(loadModelRollup).then(renderTab);
      });
    });
    // Charts must be constructed AFTER the freshly-mounted DOM has had a
    // layout pass — but a single rAF only guarantees the next render frame,
    // not that grid/flex track resolution is observable to the canvas's
    // ResizeObserver. We use a double rAF: rAF #1 fires after style/layout
    // for the innerHTML insertion, rAF #2 fires after the *next* frame,
    // by which point the .grid-2 fr-tracks are resolved AND the
    // .chart-canvas-wrap (position:absolute; inset:…) has its final pixel
    // size that Chart.js can measure. The attachFirstSizeKick safety net
    // covers the rare case where even the second rAF wins the race.
    requestAnimationFrame(() => requestAnimationFrame(() => mountOverviewCharts()));
  }
  function mountOverviewCharts() {
    const c1 = document.getElementById('ch-tokens-by-day');
    const c2 = document.getElementById('ch-tokens-by-model');
    if (c1 && state.usageDaily && state.usageDaily.length) {
      const c = tokenColors();
      const data = state.usageDaily;
      state.charts.tokensByDay = new Chart(c1, {
        type: 'bar',
        data: {
          labels: data.map(d => d.date),
          datasets: [
            { label: 'Input',  data: data.map(d => Number(d.tokens_input) || 0),  backgroundColor: c.accent, stack: 's', barPercentage: 0.78, categoryPercentage: 0.86 },
            { label: 'Output', data: data.map(d => Number(d.tokens_output) || 0), backgroundColor: 'rgba(107,180,176,0.32)', stack: 's', barPercentage: 0.78, categoryPercentage: 0.86 },
          ],
        },
        options: {
          interaction: { mode: 'index', intersect: false },
          scales: {
            x: Object.assign(noGridScale(c), {
              type: 'time',
              time: { unit: 'day', displayFormats: { day: 'MMM d' } },
              ticks: { color: c.tickDim, font: { size: 11 }, maxRotation: 0, autoSkipPadding: 24, padding: 6 },
            }),
            y: Object.assign(gridScale(c), { ticks: { ...gridScale(c).ticks, callback: v => fmtCompact(v) } }),
          },
          plugins: {
            tooltip: {
              enabled: true,
              mode: 'index',
              intersect: false,
              callbacks: {
                title: items => {
                  const d = new Date(items[0].parsed.x);
                  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                },
                label: ctx => `${ctx.dataset.label.padEnd(7)} ${fmtInt(ctx.parsed.y)}`,
              },
            },
          },
        },
      });
      attachFirstSizeKick(state.charts.tokensByDay, c1.parentElement);
    }
    if (c2 && state.modelRollup && state.modelRollup.length) {
      const c = tokenColors();
      const top = state.modelRollup.slice(0, 10);
      state.charts.tokensByModel = new Chart(c2, {
        type: 'bar',
        data: {
          labels: top.map(m => m.model && m.model.length > 28 ? m.model.slice(0, 26) + '…' : (m.model || '—')),
          datasets: [{
            data: top.map(m => (Number(m.tokens_input) || 0) + (Number(m.tokens_output) || 0)),
            backgroundColor: top.map((_, i) => MODEL_PALETTE[i % MODEL_PALETTE.length]),
            borderRadius: 3,
            barThickness: 12,
          }],
        },
        options: {
          indexAxis: 'y',
          // Horizontal bar: 'index' with axis:'y' so hovering anywhere along
          // a row triggers the tooltip (Chart.js v4 doesn't accept mode:'y').
          interaction: { mode: 'index', axis: 'y', intersect: false },
          layout: { padding: { right: 12 } },
          scales: {
            x: Object.assign(gridScale(c), { ticks: { ...gridScale(c).ticks, callback: v => fmtCompact(v) } }),
            y: Object.assign(noGridScale(c), { ticks: { color: c.tickBody, font: { size: 11, family: "'JetBrains Mono', monospace" } } }),
          },
          plugins: {
            tooltip: {
              enabled: true,
              mode: 'index',
              axis: 'y',
              intersect: false,
              callbacks: { label: ctx => fmtInt(ctx.parsed.x) + ' tokens' },
            },
          },
        },
      });
      attachFirstSizeKick(state.charts.tokensByModel, c2.parentElement);
    }
  }

  /* ====================================================================
   *  USAGE
   * ==================================================================== */
  let usageMetric = 'tokens'; // 'tokens' | 'requests'

  function buildBreakdown(calls, dim) {
    const map = new Map();
    for (const c of calls) {
      const k = c[dim];
      if (!k || k === '—') continue;
      const e = map.get(k) || { label: k, reqs: 0, tokens: 0, ok: 0 };
      e.reqs++;
      e.tokens += (Number(c.tokens_input) || 0) + (Number(c.tokens_output) || 0);
      if (c.success) e.ok++;
      map.set(k, e);
    }
    const arr = [...map.values()].map(e => ({ label: e.label, reqs: e.reqs, tokens: e.tokens, success: e.reqs ? (e.ok / e.reqs) * 100 : 0 }));
    arr.sort((a, b) => b.reqs - a.reqs);
    return arr.slice(0, 8);
  }

  function renderUsage() {
    const noUsage = !state.usageDaily || state.usageDaily.length === 0;
    const breakdownReferer = buildBreakdown(state.calls || [], 'referer');
    const breakdownUa      = buildBreakdown(state.calls || [], 'user_agent');
    const breakdownIp      = buildBreakdown(state.calls || [], 'origin_ip');
    const topModels = (state.modelRollup || []).slice(0, 8).map(m => ({
      label: m.model || '—',
      reqs: Number(m.requests) || 0,
      tokens: (Number(m.tokens_input) || 0) + (Number(m.tokens_output) || 0),
      success: m.requests ? (1 - (Number(m.errors) || 0) / Number(m.requests)) * 100 : 0,
    }));

    return `
      <div class="page">
        <div class="page-head">
          <div>
            <h1 class="page-title">Usage</h1>
            <p class="page-sub">requests and tokens over time, broken down by who's calling</p>
          </div>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <div class="seg" data-usage-metric>
              <button data-value="tokens"   class="${usageMetric==='tokens'?'on':''}">Tokens</button>
              <button data-value="requests" class="${usageMetric==='requests'?'on':''}">Requests</button>
            </div>
            <div class="seg" data-range>
              <button data-value="7"  class="${state.rangeDays===7?'on':''}">7d</button>
              <button data-value="14" class="${state.rangeDays===14?'on':''}">14d</button>
              <button data-value="30" class="${state.rangeDays===30?'on':''}">30d</button>
              <button data-value="90" class="${state.rangeDays===90?'on':''}">90d</button>
            </div>
          </div>
        </div>

        <div class="panel" style="margin-bottom:12px">
          <div class="panel-head">
            <div>
              <div class="panel-title" id="usage-title">${usageMetric === 'tokens' ? 'Tokens per day' : 'Requests per day'}</div>
              <div class="panel-sub">last ${state.rangeDays} days</div>
            </div>
          </div>
          ${noUsage ? emptyState('No traffic yet', 'Once your gateway receives requests, you will see them here.')
                   : `<div class="chart-box tall"><div class="chart-canvas-wrap"><canvas id="ch-usage-line"></canvas></div></div>`}
        </div>

        <div class="grid-cards-2">
          ${breakdownPanel('Top models',       topModels,         'Model')}
          ${breakdownPanel('Top referers',     breakdownReferer,  'Referer')}
          ${breakdownPanel('Top user-agents',  breakdownUa,       'User-Agent')}
          ${breakdownPanel('Top origin IPs',   breakdownIp,       'Origin')}
        </div>
      </div>
    `;
  }
  function breakdownPanel(title, rows, kindLabel) {
    if (!rows || !rows.length) {
      return `<div class="panel"><div class="panel-head"><div class="panel-title">${escHtml(title)}</div></div>${emptyState('Nothing yet', '')}</div>`;
    }
    const max = Math.max(...rows.map(r => r.reqs)) || 1;
    return `
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">${escHtml(title)}</div>
          <div class="panel-actions"><span class="muted" style="font-size:11px">${rows.length} rows</span></div>
        </div>
        <div class="table-wrap">
          <table class="table compact">
            <thead><tr>
              <th style="width:42%">${escHtml(kindLabel)}</th>
              <th class="right">Requests</th>
              <th class="right">Tokens</th>
              <th class="right" style="width:90px">Success</th>
              <th style="width:96px"></th>
            </tr></thead>
            <tbody>
              ${rows.map(r => `
                <tr>
                  <td><span class="ellipsis mono" title="${escAttr(r.label)}">${escHtml(r.label)}</span></td>
                  <td class="right num-cell">${fmtInt(r.reqs)}</td>
                  <td class="right num-cell">${fmtCompact(r.tokens)}</td>
                  <td class="right num-cell">${(r.success || 0).toFixed(1)}%</td>
                  <td><span class="mini-bar"><span style="width:${(r.reqs / max * 100).toFixed(0)}%"></span></span></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `;
  }
  function mountUsage() {
    document.querySelectorAll('[data-usage-metric] button').forEach(b => {
      b.addEventListener('click', () => {
        usageMetric = b.dataset.value;
        renderTab();
      });
    });
    document.querySelectorAll('[data-range] button').forEach(b => {
      b.addEventListener('click', () => {
        state.rangeDays = parseInt(b.dataset.value, 10) || 30;
        loadUsageDaily().then(loadModelRollup).then(renderTab);
      });
    });
    // Double rAF + ResizeObserver safety net — see mountOverview for the
    // full rationale. A single rAF doesn't reliably guarantee that grid
    // track widths have resolved when the canvas is constructed.
    requestAnimationFrame(() => requestAnimationFrame(() => mountUsageChart()));
  }
  function mountUsageChart() {
    const canvas = document.getElementById('ch-usage-line');
    if (!canvas || !state.usageDaily || !state.usageDaily.length) return;
    const c = tokenColors();
    const data = state.usageDaily;
    state.charts.usageLine = new Chart(canvas, {
      type: 'line',
      data: {
        labels: data.map(d => d.date),
        datasets: [{
          data: usageMetric === 'tokens'
            ? data.map(d => (Number(d.tokens_input) || 0) + (Number(d.tokens_output) || 0))
            : data.map(d => Number(d.requests) || 0),
          borderColor: c.accent,
          backgroundColor: (ctx) => {
            const { chart } = ctx;
            const { ctx: g, chartArea } = chart;
            if (!chartArea) return null;
            const grad = g.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
            grad.addColorStop(0, 'rgba(107,180,176,0.18)');
            grad.addColorStop(1, 'rgba(107,180,176,0)');
            return grad;
          },
          fill: true, pointRadius: 0, pointHoverRadius: 3,
        }],
      },
      options: {
        interaction: { mode: 'index', intersect: false },
        scales: {
          x: Object.assign(noGridScale(c), {
            type: 'time',
            time: { unit: 'day', displayFormats: { day: 'MMM d' } },
            ticks: { color: c.tickDim, font: { size: 11 }, autoSkipPadding: 24, maxRotation: 0 },
          }),
          y: Object.assign(gridScale(c), { ticks: { ...gridScale(c).ticks, callback: v => fmtCompact(v) }, beginAtZero: true }),
        },
        plugins: {
          tooltip: {
            enabled: true,
            mode: 'index',
            intersect: false,
            callbacks: {
              title: items => new Date(items[0].parsed.x).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
              label: ctx => usageMetric === 'tokens' ? fmtInt(ctx.parsed.y) + ' tokens' : fmtInt(ctx.parsed.y) + ' requests',
            },
          },
        },
      },
    });
    attachFirstSizeKick(state.charts.usageLine, canvas.parentElement);
  }

  /* ====================================================================
   *  MODELS (CRUD)
   * ==================================================================== */
  function renderModels() {
    const list = state.models || [];
    const enabled  = list.filter(m => m.active).length;
    const disabled = list.length - enabled;

    // group by provider
    const groups = {};
    for (const m of list) (groups[m.provider] = groups[m.provider] || []).push(m);

  function mountModels() {

  function openKeyModal(k) {

      try {
