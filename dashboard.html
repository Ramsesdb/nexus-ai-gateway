  function openKeyDrawer(k) {
    const myCalls = (state.calls || []).filter(c => c.provider === k.provider).slice(0, 50);
    const reqs = myCalls.length;
    const tokens = myCalls.reduce((s, c) => s + (Number(c.tokens_input) || 0) + (Number(c.tokens_output) || 0), 0);
    const ok = myCalls.filter(c => c.success).length;
    const successRate = reqs ? (ok / reqs) * 100 : 0;
    const body = `
      <div class="drawer-stats">
        <div class="drawer-stat"><div class="drawer-stat-label">Recent</div><div class="drawer-stat-value">${fmtInt(reqs)} req</div></div>
        <div class="drawer-stat"><div class="drawer-stat-label">Tokens</div><div class="drawer-stat-value">${fmtCompact(tokens)}</div></div>
        <div class="drawer-stat"><div class="drawer-stat-label">Success</div><div class="drawer-stat-value">${successRate.toFixed(1)}%</div></div>
      </div>
      <div style="margin-bottom:8px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted)">Last ${myCalls.length} calls (provider scope)</div>
      ${myCalls.length === 0 ? emptyState('No recent calls', 'No traffic for this provider in the recent window.') : `
      <div class="table-wrap" style="border:1px solid var(--border);border-radius:8px;overflow:hidden">
        <table class="table compact">
          <thead><tr>
            <th style="width:80px">Time</th>
            <th>Model</th>
            <th class="right" style="width:70px">ms</th>
            <th style="width:70px">Status</th>
          </tr></thead>
          <tbody>
            ${myCalls.map(c => `
              <tr>
                <td class="mono dim">${fmtRel(c.timestamp)}</td>
                <td class="mono ellipsis" style="max-width:200px">${escHtml(c.model || '—')}</td>
                <td class="right num-cell">${fmtMs(c.duration_ms)}</td>
                <td>${statusFromHttp(c.success, c.error_code)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>`}
    `;
    document.getElementById('drawer-title').textContent = `${provLabel(k.provider)}${k.label ? ' · ' + k.label : ''}`;
    document.getElementById('drawer-sub').textContent = `${k.key_value || k.key_masked || ''} · ${k.active ? 'active' : 'disabled'}`;
    document.getElementById('drawer-body').innerHTML = body;
    document.getElementById('drawer').classList.add('open');
    document.getElementById('drawer-scrim').classList.add('open');
    document.getElementById('drawer').setAttribute('aria-hidden', 'false');
  }

  /* ====================================================================
   *  CALL LOG
   * ==================================================================== */
  function renderLog() {
    const calls = state.calls || [];
    let filtered = calls;
    if (state.callsFilter === 'success') filtered = calls.filter(c => c.success);
    if (state.callsFilter === 'error') filtered = calls.filter(c => !c.success);
    const isEmpty = filtered.length === 0;
    return `
      <div class="page">
        <div class="page-head">
          <div>
            <h1 class="page-title">Call Log</h1>
            <p class="page-sub">most recent ${filtered.length} requests · click row to expand preview</p>
          </div>
        </div>

        <div class="panel">
          <div class="toolbar">
            <div class="search">
              <svg><use href="#i-search"/></svg>
              <input id="log-search" placeholder="Search request preview, model, IP…" />
            </div>
            <button class="filter-pill ${state.callsFilter==='all'?'active':''}" data-call-filter="all">All</button>
            <button class="filter-pill ${state.callsFilter==='success'?'active':''}" data-call-filter="success">Success</button>
            <button class="filter-pill ${state.callsFilter==='error'?'active':''}" data-call-filter="error">Errors</button>
            <div class="toolbar-spacer"></div>
            <span class="toolbar-meta" id="log-count">${filtered.length} rows</span>
            <button class="btn" id="btn-load-more" type="button">Load 50 more</button>
          </div>
          ${isEmpty ? emptyState('No requests in this view', 'Try a different filter, or send a request to your gateway.') : `
          <div class="table-wrap">
            <table class="table compact" id="log-table">
              <thead><tr>
                <th style="width:88px">Time</th>
                <th>Model</th>
                <th>Provider</th>
                <th class="right" style="width:80px">Latency</th>
                <th class="right" style="width:70px">In</th>
                <th class="right" style="width:70px">Out</th>
                <th style="width:80px">Status</th>
                <th>Origin</th>
                <th style="width:30px"></th>
              </tr></thead>
              <tbody>
                ${filtered.map((c, i) => callRow(c, i)).join('')}
              </tbody>
            </table>
          </div>
          `}
        </div>
      </div>
    `;
  }
  function callRow(c, i) {
    const reqPreview = c.request_preview || '';
    const respPreview = c.response_preview || '';
    const errMsg = !c.success ? (c.error_message || 'Error') : '';
    const errCode = !c.success ? (c.error_code || '') : '';
    const ts = c.timestamp ? new Date(c.timestamp) : null;
    return `
      <tr class="clickable" data-call-row data-idx="${i}">
        <td class="mono dim" title="${ts ? ts.toISOString() : ''}">${ts ? fmtRel(ts) : '—'}</td>
        <td class="mono">${escHtml(c.model || '—')}</td>
        <td class="dim"><span style="display:inline-flex;align-items:center;gap:6px"><span class="provider-dot" style="background:${provColor(c.provider)}"></span>${escHtml(provLabel(c.provider))}</span></td>
        <td class="right num-cell">${fmtMs(c.duration_ms)}</td>
        <td class="right num-cell">${fmtInt(c.tokens_input)}</td>
        <td class="right num-cell">${c.tokens_output ? fmtInt(c.tokens_output) : '—'}</td>
        <td>${statusFromHttp(c.success, c.error_code)}</td>
        <td class="ellipsis dim" title="${escAttr(c.origin_ip || '')}">${escHtml(c.origin_ip || '—')}</td>
        <td><svg style="width:12px;height:12px;color:var(--text-muted);transition:transform 120ms" class="chev"><use href="#i-chevron-down"/></svg></td>
      </tr>
      <tr class="expand-row" data-expand="${i}" hidden>
        <td colspan="9">
          <div class="expand-inner">
            <div class="expand-block">
              <div class="expand-label">Request preview</div>
              <div class="preview-mono">${reqPreview ? escHtml(reqPreview) : '<span class="muted">—</span>'}</div>
            </div>
            <div class="expand-block">
              <div class="expand-label">Response preview</div>
              <div class="preview-mono">${respPreview ? escHtml(respPreview) : '<span class="muted">—</span>'}</div>
            </div>
            ${errMsg ? `<div class="expand-block" style="grid-column:1/-1">
              <div class="expand-label">Error · <span class="mono" style="color:var(--error)">${escHtml(errCode)}</span></div>
              <div class="preview-mono" style="color:var(--error)">${escHtml(errMsg)}</div>
            </div>` : ''}
            <div class="expand-block" style="grid-column:1/-1;display:flex;gap:24px;flex-wrap:wrap;font-size:12px">
              <span class="muted">id <span class="mono dim">${escHtml(String(c.id || ''))}</span></span>
              <span class="muted">user-agent <span class="mono dim">${escHtml(c.user_agent || '—')}</span></span>
              <span class="muted">referer <span class="mono dim">${escHtml(c.referer || '—')}</span></span>
              <span class="muted">origin <span class="mono dim">${escHtml(c.origin_ip || '—')}</span></span>
            </div>
          </div>
        </td>
      </tr>
    `;
  }
  function mountLog() {
    document.querySelectorAll('[data-call-filter]').forEach(b => {
      b.addEventListener('click', () => {
        state.callsFilter = b.dataset.callFilter;
        renderTab();
      });
    });
    document.querySelectorAll('[data-call-row]').forEach(tr => {
      tr.addEventListener('click', () => {
        const idx = tr.dataset.idx;
        const expandRow = document.querySelector(`[data-expand="${idx}"]`);
        if (!expandRow) return;
        const isOpen = !expandRow.hidden;
        document.querySelectorAll('[data-expand]').forEach(r => r.hidden = true);
        document.querySelectorAll('[data-call-row]').forEach(r => {
          r.classList.remove('expanded');
          const ch = r.querySelector('.chev'); if (ch) ch.style.transform = '';
        });
        if (!isOpen) {
          expandRow.hidden = false;
          tr.classList.add('expanded');
          const ch = tr.querySelector('.chev'); if (ch) ch.style.transform = 'rotate(180deg)';
        }
      });
    });
    const search = document.getElementById('log-search');
    const countEl = document.getElementById('log-count');
    if (search) search.addEventListener('input', e => {
      const q = e.target.value.toLowerCase();
      let visible = 0;
      document.querySelectorAll('[data-call-row]').forEach((tr, i) => {
        const expand = document.querySelector(`[data-expand="${i}"]`);
        const text = (tr.textContent + ' ' + (expand ? expand.textContent : '')).toLowerCase();
        const show = text.includes(q);
        tr.style.display = show ? '' : 'none';
        if (expand && !show) expand.hidden = true;
        if (show) visible++;
      });
      if (countEl) countEl.textContent = visible + ' rows';
    });
    const more = document.getElementById('btn-load-more');
    if (more) more.addEventListener('click', async () => {
      state.callsOffset += 50;
      await loadCalls(true);
      renderTab();
    });
  }

  /* ====================================================================
   *  Confirm delete (modal)
   * ==================================================================== */
  function confirmDelete(type, id, name) {
    const html = `
      <div class="modal-overlay" data-modal-overlay>
        <div class="modal" style="width:400px">
          <div class="modal-header">
            <h3>Confirm delete</h3>
            <button class="modal-close" data-modal-close aria-label="Close">×</button>
          </div>
          <div class="modal-body">
            <p style="margin:0 0 12px;color:var(--text-dim)">Are you sure you want to delete <strong style="color:var(--text)">${escHtml(name || '')}</strong>?</p>
            <p style="font-size:12px;color:var(--error);margin:0 0 16px">This action cannot be undone.</p>
            <div class="form-actions">
              <button class="btn" data-modal-close>Cancel</button>
              <button class="btn danger" id="btn-confirm-delete">Delete</button>
            </div>
          </div>
        </div>
      </div>`;
    document.getElementById('modal-container').innerHTML = html;
    wireModalClose();
    document.getElementById('btn-confirm-delete').onclick = async () => {
      try {
        const url = type === 'model' ? `/dashboard/models/${id}` : `/dashboard/api-keys/${id}`;
        const r = await fetch(url, { method: 'DELETE', headers: authHeaders() });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        toast('Deleted');
        closeModal();
        if (type === 'model') await loadModels(); else await loadApiKeys();
        renderTab();
      } catch (e) { toast('Error: ' + e.message, 'error'); }
    };
  }
  function authHeaders() {
    const h = { 'Content-Type': 'application/json' };
    if (AUTH_KEY) h['Authorization'] = `Bearer ${AUTH_KEY}`;
    return h;
  }
  function closeModal() { document.getElementById('modal-container').innerHTML = ''; }
  function wireModalClose() {
    document.querySelectorAll('[data-modal-close]').forEach(el => el.addEventListener('click', closeModal));
    document.querySelectorAll('[data-modal-overlay]').forEach(el => {
      el.addEventListener('click', (e) => { if (e.target === el) closeModal(); });
    });
  }

  /* ====================================================================
   *  Data loaders
   * ==================================================================== */
  async function loadSummary() {
    try {
      state.summary = await api('/dashboard/summary');
      setOnline(true);
    } catch (e) { console.error('loadSummary:', e); setOnline(false); }
  }
  async function loadUsageDaily() {
    try {
      const data = await api('/dashboard/usage?period=daily&days=' + state.rangeDays);
      state.usageDaily = Array.isArray(data) ? data : [];
    } catch (e) { console.error('loadUsageDaily:', e); state.usageDaily = []; }
  }
  async function loadModelRollup() {
    try {
      const data = await api('/dashboard/usage-by-model?days=' + state.rangeDays);
      state.modelRollup = Array.isArray(data) ? data : [];
    } catch (e) { console.error('loadModelRollup:', e); state.modelRollup = []; }
  }
  async function loadCalls(append) {
    if (!append) state.callsOffset = 0;
    try {
      const data = await api(`/dashboard/calls?limit=50&offset=${state.callsOffset}`);
      const arr = Array.isArray(data) ? data : [];
      if (append) state.calls = (state.calls || []).concat(arr);
      else state.calls = arr;
    } catch (e) { console.error('loadCalls:', e); if (!append) state.calls = []; }
  }
  async function loadModels() {
    try {
      const data = await api('/dashboard/models');
      state.models = Array.isArray(data) ? data : [];
      const el = document.getElementById('nav-models-count');
      if (el) el.textContent = String(state.models.length);
    } catch (e) { console.error('loadModels:', e); state.models = []; }
  }
  async function loadApiKeys() {
    try {
      const data = await api('/dashboard/api-keys');
      // server returns key_value (already masked); also support key_masked
      state.apiKeys = (Array.isArray(data) ? data : []).map(k => ({
        ...k,
        key_value: k.key_value || k.key_masked || '',
      }));
      const el = document.getElementById('nav-keys-count');
      if (el) el.textContent = String(state.apiKeys.length);
    } catch (e) { console.error('loadApiKeys:', e); state.apiKeys = []; }
  }

  function setOnline(ok) {
    state.online = ok;
    const dot = document.getElementById('live-dot');
    const lbl = document.getElementById('live-label');
    const who = document.getElementById('who-status');
    if (dot) dot.classList.toggle('offline', !ok);
    if (lbl) lbl.textContent = ok ? 'live · refreshes 30s' : 'offline · retrying';
    if (who) who.textContent = ok ? 'live' : 'offline';
  }

  /* ====================================================================
   *  Live KPI tick (auto-refresh w/o full re-render of charts)
   * ==================================================================== */
  function liveKpiTick() {
    if (state.tab !== 'overview' || !state.summary) return;
    const k = deriveOverview();
    const els = document.querySelectorAll('.kpis .kpi-value');
    if (els[0]) els[0].textContent = fmtCompact(k.tokens.value);
    if (els[1]) els[1].textContent = fmtInt(k.requests.value);
    if (els[2]) els[2].textContent = fmtInt(k.errors.value);
    if (els[3]) els[3].textContent = fmtMs(k.latency.avg);
  }

  /* ====================================================================
   *  Init
   * ==================================================================== */
  async function bootstrap() {
    applyChartDefaults();
    // initial parallel loads (everything the active tab might need)
    await Promise.all([
      loadSummary(),
      loadUsageDaily(),
      loadModelRollup(),
      loadCalls(false),
      loadModels(),
      loadApiKeys(),
    ]);
    renderTab();
  }

  function init() {
    document.querySelectorAll('#nav .nav-item[data-tab]').forEach(el => {
      el.addEventListener('click', () => switchTab(el.dataset.tab));
    });
    document.getElementById('drawer-close').addEventListener('click', closeDrawer);
    document.getElementById('drawer-scrim').addEventListener('click', closeDrawer);
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeDrawer(); closeModal(); }
    });
    document.getElementById('btn-refresh').addEventListener('click', async (e) => {
      const btn = e.currentTarget;
      btn.classList.add('spinning');
      try {
        await Promise.all([loadSummary(), loadUsageDaily(), loadModelRollup(), loadCalls(false)]);
        if (state.tab === 'models') await loadModels();
        if (state.tab === 'keys') await loadApiKeys();
        renderTab();
      } finally {
        setTimeout(() => btn.classList.remove('spinning'), 800);
      }
    });
    bootstrap();

    // Auto-refresh every 30s.
    // For Overview we update KPI numbers in place to demonstrate the
    // chart.update() pattern without rebuilding charts.
    setInterval(async () => {
      try {
        await loadSummary();
        if (state.tab === 'overview') {
          // refresh underlying datasets, then update charts in place
          await Promise.all([loadUsageDaily(), loadModelRollup(), loadCalls(false)]);
          liveKpiTick();
          if (state.charts.tokensByDay && state.usageDaily) {
            state.charts.tokensByDay.data.labels = state.usageDaily.map(d => d.date);
            state.charts.tokensByDay.data.datasets[0].data = state.usageDaily.map(d => Number(d.tokens_input) || 0);
            state.charts.tokensByDay.data.datasets[1].data = state.usageDaily.map(d => Number(d.tokens_output) || 0);
            state.charts.tokensByDay.update('none');
          }
          if (state.charts.tokensByModel && state.modelRollup) {
            const top = state.modelRollup.slice(0, 10);
            state.charts.tokensByModel.data.labels = top.map(m => m.model && m.model.length > 28 ? m.model.slice(0, 26) + '…' : (m.model || '—'));
            state.charts.tokensByModel.data.datasets[0].data = top.map(m => (Number(m.tokens_input) || 0) + (Number(m.tokens_output) || 0));
            state.charts.tokensByModel.update('none');
          }
        } else if (state.tab === 'log') {
          await loadCalls(false);
          renderTab();
        } else if (state.tab === 'usage') {
          await Promise.all([loadUsageDaily(), loadModelRollup(), loadCalls(false)]);
          if (state.charts.usageLine && state.usageDaily) {
            state.charts.usageLine.data.labels = state.usageDaily.map(d => d.date);
            state.charts.usageLine.data.datasets[0].data = usageMetric === 'tokens'
              ? state.usageDaily.map(d => (Number(d.tokens_input) || 0) + (Number(d.tokens_output) || 0))
              : state.usageDaily.map(d => Number(d.requests) || 0);
            state.charts.usageLine.update('none');
          }
        }
      } catch (e) { console.error('autoRefresh:', e); }
    }, 30000);
  }

  function closeDrawer() {
    document.getElementById('drawer').classList.remove('open');
    document.getElementById('drawer-scrim').classList.remove('open');
    document.getElementById('drawer').setAttribute('aria-hidden', 'true');
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
</body>
</html>
